# ══════════════════════════════════════════════════════════════
# OptimusDB / iceberg-decentralized  —  NODE-A
# Node ID : node-alpha
# ══════════════════════════════════════════════════════════════
#
# Host ports:
#   Trino SQL      : 8080
#   Iceberg catalog: 8181
#   IPFS API       : 5001
#   IPFS Gateway   : 8888
#   Zenoh protocol : 7447  (peered to other nodes via iceberg-mesh)
#   Zenoh REST     : 8000
#   Bridge metrics : 9090

networks:
  iceberg-net-a:
    driver: bridge
    name: iceberg-net-a
  iceberg-mesh:
    external: true

volumes:
  ipfs-data-node-a:
    name: ipfs-data-node-a
  warehouse-node-a:
    name: warehouse-node-a

services:

  # ── 1. IPFS ───────────────────────────────────
  ipfs-node:
    image: ipfs/kubo:v0.26.0
    container_name: iceberg-ipfs-node-a
    restart: unless-stopped
    environment:
      IPFS_PATH: /data/ipfs
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ipfs init --profile=server 2>/dev/null || true
        ipfs config Addresses.API /ip4/0.0.0.0/tcp/5001
        ipfs config Addresses.Gateway /ip4/0.0.0.0/tcp/8080
        ipfs config --json API.HTTPHeaders.Access-Control-Allow-Origin "[\"*\"]"
        ipfs config --json API.HTTPHeaders.Access-Control-Allow-Methods "[\"PUT\",\"POST\",\"GET\"]"
        ipfs config --json API.HTTPHeaders.Access-Control-Allow-Headers "[\"Authorization\"]"
        exec ipfs daemon --migrate=true --enable-gc
    ports:
      - "5001:5001"
      - "4001:4001"
      - "8888:8080"
    volumes:
      - ipfs-data-node-a:/data/ipfs
    networks:
      - iceberg-net-a
    healthcheck:
      test: ["CMD", "ipfs", "id"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ── 2. Zenoh Router ───────────────────────────
  # Peers to the other two nodes via the shared iceberg-mesh network
  zenoh:
    image: eclipse/zenoh:0.11.0
    container_name: iceberg-zenoh-node-a
    restart: unless-stopped
    command:
      - "--rest-http-port"
      - "8000"
      - "--connect"
      - "tcp/iceberg-zenoh-node-b:7447"
      - "--connect"
      - "tcp/iceberg-zenoh-node-c:7447"
    ports:
      - "7447:7447"
      - "8000:8000"
    networks:
      - iceberg-net-a
      - iceberg-mesh
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/@/router/local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── 3. Iceberg Catalog ────────────────────────
  iceberg-catalog:
    image: tabulario/iceberg-rest:0.10.0
    container_name: iceberg-catalog-node-a
    restart: unless-stopped
    environment:
      CATALOG_WAREHOUSE: /iceberg-warehouse
      CATALOG_IO__IMPL: org.apache.iceberg.hadoop.HadoopFileIO
    ports:
      - "8181:8181"
    volumes:
      - warehouse-node-a:/iceberg-warehouse
    networks:
      - iceberg-net-a
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8181/v1/config"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ── 4. Trino Coordinator ──────────────────────
  trino-coordinator:
    image: trinodb/trino:435
    container_name: iceberg-trino-coordinator-node-a
    restart: unless-stopped
    depends_on:
      iceberg-catalog:
        condition: service_started
    ports:
      - "8080:8080"
    volumes:
      - ./config/coordinator/config.properties:/etc/trino/config.properties:ro
      - ./config/coordinator/jvm.config:/etc/trino/jvm.config:ro
      - ./config/coordinator/node.properties:/etc/trino/node.properties:ro
      - ./config/catalog/iceberg.properties:/etc/trino/catalog/iceberg.properties:ro
      - warehouse-node-a:/iceberg-warehouse
    networks:
      - iceberg-net-a
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/v1/info"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 120s

  # ── 5. Trino Worker 1 ─────────────────────────
  trino-worker-1:
    image: trinodb/trino:435
    container_name: iceberg-trino-worker1-node-a
    restart: unless-stopped
    depends_on:
      trino-coordinator:
        condition: service_started
    volumes:
      - ./config/worker/config.properties:/etc/trino/config.properties:ro
      - ./config/worker/jvm.config:/etc/trino/jvm.config:ro
      - ./config/worker/node.properties:/etc/trino/node.properties:ro
      - ./config/catalog/iceberg.properties:/etc/trino/catalog/iceberg.properties:ro
      - warehouse-node-a:/iceberg-warehouse
    networks:
      - iceberg-net-a
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/v1/info"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 120s

  # ── 6. Trino Worker 2 ─────────────────────────
  trino-worker-2:
    image: trinodb/trino:435
    container_name: iceberg-trino-worker2-node-a
    restart: unless-stopped
    depends_on:
      trino-coordinator:
        condition: service_started
    volumes:
      - ./config/worker/config.properties:/etc/trino/config.properties:ro
      - ./config/worker/jvm.config:/etc/trino/jvm.config:ro
      - ./config/worker/node.properties:/etc/trino/node.properties:ro
      - ./config/catalog/iceberg.properties:/etc/trino/catalog/iceberg.properties:ro
      - warehouse-node-a:/iceberg-warehouse
    networks:
      - iceberg-net-a
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/v1/info"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 120s

  # ── 7. Bridge ─────────────────────────────────
  bridge:
    image: optimusdb/zenoh-iceberg-bridge:0.1.0
    container_name: iceberg-bridge-node-a
    restart: unless-stopped
    depends_on:
      zenoh:
        condition: service_started
      iceberg-catalog:
        condition: service_started
      ipfs-node:
        condition: service_started
    environment:
      ZENOH_ENDPOINT: "tcp/zenoh:7447"
      CATALOG_ENDPOINT: "http://iceberg-catalog:8181"
      IPFS_API: "http://ipfs-node:5001"
      SYNC_INTERVAL_SECONDS: "30"
      NODE_ID: "node-alpha"
      METRICS_PORT: "9090"
    ports:
      - "9090:9090"
    networks:
      - iceberg-net-a
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "9090"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s